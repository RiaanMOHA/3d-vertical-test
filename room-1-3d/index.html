<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>room-1</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1b1f; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; color: #f5f5f7; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    .ui { position: fixed; pointer-events: none; user-select: none; font-size: 12px; letter-spacing: 0.03em; }
    #mode { top: 14px; left: 14px; padding: 8px 12px; background: rgba(0,0,0,0.55); border-radius: 6px; backdrop-filter: blur(6px); }
    #mode b { font-weight: 600; }
    #exterior-link { position: fixed; top: 14px; right: 14px; padding: 8px 12px; background: rgba(0,0,0,0.55); border-radius: 6px; backdrop-filter: blur(6px); color: #f5f5f7; text-decoration: none; font-size: 12px; letter-spacing: 0.03em; pointer-events: auto; }
    #exterior-link:hover { background: rgba(0,0,0,0.8); }
    #hints { bottom: 14px; left: 50%; transform: translateX(-50%); padding: 8px 14px; background: rgba(0,0,0,0.55); border-radius: 6px; backdrop-filter: blur(6px); text-align: center; line-height: 1.55; }
    kbd { background: rgba(255,255,255,0.12); border-radius: 3px; padding: 1px 6px; font-family: ui-monospace, monospace; font-size: 11px; }
    #crosshair { position: fixed; top: 50%; left: 50%; width: 6px; height: 6px; margin: -3px 0 0 -3px; border-radius: 50%; background: rgba(255,255,255,0.6); display: none; pointer-events: none; }
    body.walk #crosshair { display: block; }
  </style>
</head>
<body>
  <div id="mode" class="ui">mode: <b id="mode-val">orbit</b></div>
  <a id="exterior-link" href="http://localhost:8080/ozu-test.html">← exterior</a>
  <div id="hints" class="ui">
    <kbd>M</kbd> toggle walk / orbit · <kbd>WASD</kbd> move (walk) · scroll to zoom (orbit) · <kbd>ESC</kbd> exit walk
  </div>
  <div id="crosshair"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
